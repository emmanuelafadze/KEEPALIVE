name: Supabase Keepalive With Headers

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Function (JWT)
        env:
          SUPABASE_URL: https://rzuvxoqxqcikcnysohmm.supabase.co
          # Legacy API key (JWT-based) from "Legacy API Keys" -> service_role (starts with eyJ...)
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_JWT }}
        run: |
          set -euo pipefail

          echo "Sending POST request to $SUPABASE_URL/functions/v1/keepalive..."

          HTTP_CODE=$(curl -sS -o /tmp/keepalive-body.txt -w "%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/keepalive" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            --data '{"name":"keepalive-ping"}')

          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Response body:"
            cat /tmp/keepalive-body.txt
            echo "⚠️ Supabase ping failed!"
            exit 1
          fi
