name: Supabase Keepalive with Headers

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Function
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: https://rzuvxoqxqcikcnysohmm.supabase.co
        run: |
          echo "Sending POST request with headers..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L \
            -X POST "$SUPABASE_URL/functions/v1/keepalive" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            --data '{"name":"Functions"}')

          echo "Response code: $RESPONSE"

          if [ "$RESPONSE" -ne 200 ]; then
            echo "⚠️ Supabase ping failed!"
            exit 1
          fi
