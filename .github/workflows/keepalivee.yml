name: Supabase Keepalive With Headers

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Function (JWT)
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: https://rzuvxoqxqcikcnysohmm.supabase.co
        run: |
          set -euo pipefail

          echo "Sending POST request to keepalive..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L \
            -X POST "$SUPABASE_URL/functions/v1/keepalive" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            --data '{"name":"keepalive-ping"}')

          echo "Response code: $RESPONSE"

          if [ "$RESPONSE" -ne 200 ]; then
            echo "⚠️ Supabase ping failed!"
            exit 1
          fi
